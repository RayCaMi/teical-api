# Blueprint do Render: ao criar o servico via "New > Blueprint", ele le este
# arquivo e configura tudo sozinho. As chaves (sync: false) sao pedidas na hora.
services:
  - type: web
    name: teical-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.13.7
